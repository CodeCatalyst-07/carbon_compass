name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build  # includes secret-scan via postbuild
      - run: npm test

  ai-core-quality:
    name: AI Core Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/ai-core/package-lock.json
      - run: npm ci --prefix packages/ai-core
      - run: npm run format:check --prefix packages/ai-core
      - run: npm run typecheck --prefix packages/ai-core
      - run: npm run lint --prefix packages/ai-core
      - run: npm test --prefix packages/ai-core
      - run: npm run build --prefix packages/ai-core

  server-quality:
    name: Server Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      # Build ai-core first — server depends on @carbon-compass/ai-core
      - run: npm ci --prefix packages/ai-core
      - run: npm run build --prefix packages/ai-core
      - run: npm ci --prefix server
      - run: npm run format:check --prefix server
      - run: npm run typecheck --prefix server
      - run: npm run lint --prefix server
      - run: npm test --prefix server
      - run: npm run build --prefix server

  functions-quality:
    name: Functions Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json
      # Build ai-core first — functions depends on @carbon-compass/ai-core
      - run: npm ci --prefix packages/ai-core
      - run: npm run build --prefix packages/ai-core
      - run: npm ci --prefix functions
      - run: npm run format:check --prefix functions
      - run: npm run typecheck --prefix functions
      - run: npm run lint --prefix functions
      - run: npm test --prefix functions
      - run: npm run build --prefix functions
